<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Information</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 15px;
            text-align: center;
        }
        th {
            background-color: #007BFF;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        caption {
            font-size: 1.5em;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <table>
        <caption>Employee Information</caption>
        <thead>
            <tr>
                <th>Emp ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Salary (₹)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>101</td>
                <td>Ramesh Kumar</td>
                <td>28</td>
                <td>50,000</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Anita Sharma</td>
                <td>32</td>
                <td>65,000</td>
            </tr>
            <tr>
                <td>103</td>
                <td>Arjun Patel</td>
                <td>26</td>
                <td>45,000</td>
            </tr>
            <tr>
                <td>104</td>
                <td>Meena Reddy</td>
                <td>30</td>
                <td>70,000</td>
            </tr>
            <tr>
                <td>105</td>
                <td>Ram Naresh A</td>
                <td>38</td>
                <td>183,333</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
